name: CI

on:
  push:
    branches: [main]
    tags:
      - '*'
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build core
        run: pnpm --filter agent-client-toolkit-ts build

      - name: Build React
        run: pnpm --filter agent-client-toolkit-react build

      - name: Typecheck core
        run: pnpm --filter agent-client-toolkit-ts typecheck

      - name: Test core
        run: pnpm --filter agent-client-toolkit-ts test

      - name: Test React
        run: pnpm --filter agent-client-toolkit-react test

      - name: Coverage
        if: matrix.node-version == 20
        run: pnpm test:coverage

      - name: Coverage Summary
        if: matrix.node-version == 20
        run: |
          CORE_SUMMARY="packages/conversational-ai/coverage/coverage-summary.json"
          REACT_SUMMARY="packages/react/coverage/coverage-summary.json"

          if [ ! -f "$CORE_SUMMARY" ] || [ ! -f "$REACT_SUMMARY" ]; then
            echo "Coverage summary file(s) missing"
            ls -la packages/conversational-ai/coverage || true
            ls -la packages/react/coverage || true
            exit 1
          fi

          core_lines=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(j.total.lines.pct));" "$CORE_SUMMARY")
          core_branches=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(j.total.branches.pct));" "$CORE_SUMMARY")
          core_functions=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(j.total.functions.pct));" "$CORE_SUMMARY")
          core_statements=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(j.total.statements.pct));" "$CORE_SUMMARY")

          react_lines=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(j.total.lines.pct));" "$REACT_SUMMARY")
          react_branches=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(j.total.branches.pct));" "$REACT_SUMMARY")
          react_functions=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(j.total.functions.pct));" "$REACT_SUMMARY")
          react_statements=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(j.total.statements.pct));" "$REACT_SUMMARY")

          {
            echo "## Coverage Summary"
            echo
            echo "| Package | Lines | Branches | Functions | Statements |"
            echo "| --- | ---: | ---: | ---: | ---: |"
            echo "| agora-agent-client-toolkit | ${core_lines}% | ${core_branches}% | ${core_functions}% | ${core_statements}% |"
            echo "| agora-agent-client-toolkit-react | ${react_lines}% | ${react_branches}% | ${react_functions}% | ${react_statements}% |"
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    needs: [build-and-test]
    if: (github.event_name == 'push' && contains(github.ref, 'refs/tags/')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Publish core to npm
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          REMOTE_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "")
          if [ "$LOCAL_VERSION" = "$REMOTE_VERSION" ]; then
            echo "Skipping $PACKAGE_NAME@$LOCAL_VERSION (already published)"
          else
            echo "Publishing $PACKAGE_NAME@$LOCAL_VERSION"
            npm publish --provenance --access public
          fi
        working-directory: packages/conversational-ai
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish react to npm
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          REMOTE_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "")
          if [ "$LOCAL_VERSION" = "$REMOTE_VERSION" ]; then
            echo "Skipping $PACKAGE_NAME@$LOCAL_VERSION (already published)"
          else
            echo "Publishing $PACKAGE_NAME@$LOCAL_VERSION"
            npm publish --provenance --access public
          fi
        working-directory: packages/react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
